version: '3.8'

services:
  klimcode:
    build: .
    container_name: klimcode
    ports:
      - '7700:7700'
    environment:
      - KLIMCODE_PORT=7700
      - KLIMCODE_HOST=0.0.0.0
      - KLIMCODE_SECRET=${KLIMCODE_SECRET:-change-me-in-production}
      - KLIMCODE_NVIDIA_API_KEY=${KLIMCODE_NVIDIA_API_KEY}
      - KLIMCODE_GITHUB_CLIENT_ID=${KLIMCODE_GITHUB_CLIENT_ID}
      - KLIMCODE_GITHUB_CLIENT_SECRET=${KLIMCODE_GITHUB_CLIENT_SECRET}
      - KLIMCODE_GITHUB_WEBHOOK_SECRET=${KLIMCODE_GITHUB_WEBHOOK_SECRET}
      - KLIMCODE_DB_PATH=/app/data/klimcode.db
      - KLIMCODE_SANDBOX_DIR=/app/data/sandboxes
    volumes:
      - klimcode-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:7700').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  klimcode-data:
    driver: local
