<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="description" content="KlimCode — AI-powered coding assistant. Chat, debug, and create GitHub PRs with free NVIDIA AI models." />
		<meta name="theme-color" content="#ffffff" />
		<meta name="color-scheme" content="light dark" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
		<title>KlimCode</title>
		<script>
			// Prevent flash of wrong theme
			(function() {
				var theme = localStorage.getItem('klimcode_theme') || 'system';
				var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (isDark) {
					document.documentElement.classList.add('dark');
					document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#0a0a0b');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body class="antialiased" data-sveltekit-preload-data="hover">
		<div id="klimcode-app" style="display: contents">%sveltekit.body%</div>
	</body>
</html>
